<!DOCTYPE html>
<html>
<head>
<title>SIGNAL FOUND</title>

<style>
body { 
    background: black;
    color: red;
    font-family: monospace;
    text-align: center;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    height: 100vh;
    margin: 0;
}

button {
    background: red;
    color: black;
    padding: 10px;
    margin: 10px;
    border: none;
    cursor: pointer;
}
</style>

</head>
<body>

<h1>UNIDENTIFIED SIGNAL DETECTED</h1>
<p>Do you wish to continue?</p>

<button onclick="goYes()">YES</button>
<button onclick="glitch()">NO</button>

<!-- ✅ ADDED: audio element -->
<audio id="scream" src="freesound_community-jumpscare-94984.mp3"></audio>

<script>
function goYes() {
    window.location.href = "watch.html";
}

function glitch() {
    document.body.innerHTML = `
        <h1>...you don't have a choice...</h1>
        <p>redirecting...</p>
    `;

    // 👁️ ADDED: delayed jumpscare before redirect
    setTimeout(() => {
        const sound = document.getElementById("scream");
        if (sound) {
            sound.volume = 0.6;
            sound.currentTime = 0;
            sound.play();
        }

        // quick flash
        document.body.style.background = "white";
        setTimeout(() => {
            document.body.style.background = "black";
        }, 100);

    }, 800);

    setTimeout(() => {
        window.location.href = "watch.html";
    }, 2000);
}
</script>

</body>
</html>
