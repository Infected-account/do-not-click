<!DOCTYPE html>
<html>
<head>
  <title>log_0686</title>

  <style>
    body {
      background-color: black;
      color: #ff2a2a;
      font-family: monospace;
      padding: 40px;
    }

    h1 {
      text-align: center;
      letter-spacing: 3px;
    }

    .entry {
      margin-top: 40px;
      white-space: pre-line;
    }

    .flicker {
      animation: flicker 2s infinite;
    }

    @keyframes flicker {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    #unlockBtn {
      display: block;
      margin: 60px auto;
      background: black;
      color: #550000;
      border: 1px solid #220000;
      padding: 10px 20px;
      cursor: pointer;
      font-family: monospace;
    }

    #unlockBtn:hover {
      color: red;
      border-color: red;
    }

    #log {
      display: none;
    }
  </style>
</head>

<body>

  <h1 class="flicker">[LOG_0686]</h1>

  <!-- ✅ FIXED BUTTON -->
  <button id="unlockBtn" onclick="unlockLogs()">continue</button>

  <div id="log"></div>

  <audio id="creepyAudio" src="creepy.mp3"></audio>

  <script>
   
    const entries = [
`date: unknown
journal entry 1
"it's reacting when i go through the pages. i guess it doesn't like when i continue on."`,

`date: unknown
journal entry 2
"This infection is spreading fast..."`
    ];

    const logContainer = document.getElementById("log");

    let entryDivs = [];

    entries.forEach(entry => {
      let lines = entry.split("\n");

      let div = document.createElement("div");
      div.className = "entry";

      div.innerHTML = lines[0] + "\n" + lines[1];

      let content = document.createElement("div");
      content.innerHTML = "";
      div.appendChild(document.createElement("br"));
      div.appendChild(content);

      logContainer.appendChild(div);

      entryDivs.push(content);
    });

    // ✅ FIXED SCRIPT ARRAY
   const script = [
{ time: 0.07, word: "\"it's", entry: 0 },
{ time: 0.86, word: "reacting", entry: 0 },
{ time: 1.05, word: "when", entry: 0 },
{ time: 1.54, word: "i", entry: 0 },
{ time: 1.80, word: "go", entry: 0 },
{ time: 2.20, word: "through", entry: 0 },
{ time: 2.31, word: "the", entry: 0 },
{ time: 2.63, word: "pages.", entry: 0 },

{ time: 4.03, word: "i", entry: 0 },
{ time: 4.23, word: "guess", entry: 0 },
{ time: 4.35, word: "it", entry: 0 },
{ time: 4.46, word: "doesn't", entry: 0 },
{ time: 4.78, word: "like", entry: 0 },
{ time: 4.94, word: "when", entry: 0 },
{ time: 5.08, word: "i", entry: 0 },
{ time: 5.30, word: "continue", entry: 0 },
{ time: 5.77, word: "on.\"", entry: 0 },
];

    const audio = document.getElementById("creepyAudio");
    let currentIndex = 0;

    audio.addEventListener("timeupdate", () => {
      while (
        currentIndex < script.length &&
        audio.currentTime >= script[currentIndex].time
      ) {
        let part = script[currentIndex];
        entryDivs[part.entry].innerHTML += part.word + " ";
        currentIndex++;
      }
    });

    function unlockLogs() {
      document.getElementById("unlockBtn").style.display = "none";
      document.getElementById("log").style.display = "block";

      audio.volume = 0.7;
      audio.play().catch(() => {
        console.log("Audio blocked until interaction (normal)");
      });
    }

  </script>

</body>
</html>
